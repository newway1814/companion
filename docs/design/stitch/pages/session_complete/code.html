<body class="bg-[#F7F4EE] text-on-surface min-h-screen flex items-center justify-center font-body-md font-body-md">
<!-- Top Navigation Omitted for Transactional/Linear screen as per guidelines -->
<main class="w-full max-w-container-max mx-auto px-gutter flex items-center justify-center py-16">
<!-- Centered Completion Card -->
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl border border-outline-variant/30 shadow-[0px_4px_20px_rgba(0,0,0,0.05)] overflow-hidden relative">
<!-- Subtle Top Accent -->
<div class="h-1 bg-primary-container w-full"></div>
<div class="p-8 md:p-10 text-center flex flex-col items-center">
<!-- Icon/Relief Visual -->
<div class="w-20 h-20 bg-primary-fixed-dim/20 rounded-full flex items-center justify-center mb-6 border border-primary-fixed-dim/40 relative">
<!-- Subtle pulse animation ring -->
<div class="absolute inset-0 rounded-full border border-primary-fixed-dim/50 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]"></div>
<span class="material-symbols-outlined text-4xl text-primary-container" style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
</div>
<!-- Headline -->
<h1 class="font-display-md text-display-md text-on-surface mb-3 tracking-tight">Interview complete</h1>
<!-- Summary Text -->
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mb-8 leading-relaxed">
                    You completed a 5-question deep-dive. Found <span class="font-semibold text-on-surface">3 claim-defense issues</span> and <span class="font-semibold text-on-surface">2 missing metrics</span>.
                </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-3">
<button class="w-full bg-primary-container text-on-primary font-body-md text-body-md font-medium py-3 px-6 rounded-lg hover:bg-primary transition-colors duration-200 shadow-sm flex items-center justify-center gap-2 group">
<span>View coaching report</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="w-full bg-surface-container-lowest text-on-surface border border-[#DDD6CC] font-body-md text-body-md font-medium py-3 px-6 rounded-lg hover:bg-surface-container-low transition-colors duration-200">
                        Practice again
                    </button>
</div>
</div>
<!-- Decorative Subtle Pattern Bottom -->
<div class="h-4 w-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-container-low to-surface-container-lowest opacity-50"></div>
</div>
